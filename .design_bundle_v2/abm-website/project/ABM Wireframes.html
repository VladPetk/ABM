<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ABM · Political Polarization — Website Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=Caveat:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #eae7de; }
  body { font-family: 'Geist', -apple-system, system-ui, sans-serif; color: #1a1d23; font-feature-settings: 'ss01', 'cv11', 'tnum'; }
  * { box-sizing: border-box; }

  /* modern tokens (primary) — calm, confident, editorial */
  :root {
    --bg: #f3f3f0;          /* cool-neutral warm grey */
    --bg-2: #ebe8df;
    --surface: #ffffff;
    --ink: #1a1d23;         /* deep, slightly cool */
    --ink-2: #3d4148;
    --ink-3: #74797f;
    --ink-4: #adb1b5;
    --border: #e0ddd3;
    --border-strong: #cdc9bd;
    --r: #8b2530;           /* deep oxblood (right pole) */
    --b: #1f3565;           /* deep navy   (left pole) */
    --r-soft: #ead7d9;
    --b-soft: #d4d9e3;
    /* legacy (for A-D) */
    --paper: #fbf8f1;
    --paper-2: #f3eee2;
    --ink-legacy: #1a1a1a;
    --rule: #2b2b2b;
    --rule-soft: #b8b3a4;
    --accent-r: #a23a3a;
    --accent-b: #2f4a86;
    --note: #c47a2c;
  }

  /* sketchy text styles used across artboards */
  .wf { color: var(--ink); }
  .wf-hand { font-family: 'Caveat', cursive; color: var(--note); }
  .wf-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .wf-sub { font-family: 'Newsreader', serif; font-style: italic; color: var(--ink-3); }

  /* placeholder boxes */
  .wf-ph {
    border: 1.25px dashed var(--rule);
    background: repeating-linear-gradient(135deg, transparent 0 8px, rgba(0,0,0,.045) 8px 9px);
    color: var(--ink-3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive; font-size: 18px;
  }
  .wf-box { border: 1.25px solid var(--rule); background: var(--paper); }
  .wf-box-soft { border: 1px solid var(--rule-soft); background: var(--paper); }
  .wf-line { background: var(--ink); }

  /* fake "text" bars */
  .bar { height: 6px; background: #d6d1c2; border-radius: 2px; }
  .bar.dark { background: #2b2b2b; }
  .bar.thin { height: 4px; }
  .bar.tall { height: 8px; }
  .bar.short { width: 40%; }
  .bar.mid { width: 70%; }
  .bar.long { width: 92%; }
  .bar.fade { background: linear-gradient(90deg, #2b2b2b 0%, #2b2b2b 60%, #d6d1c2 60%, #d6d1c2 100%); }

  /* paper background */
  .paper {
    background: var(--paper);
    background-image:
      radial-gradient(rgba(0,0,0,.018) 1px, transparent 1px),
      linear-gradient(180deg, rgba(255,255,255,.6), rgba(255,255,255,0) 40%);
    background-size: 14px 14px, auto;
    box-shadow: 0 1px 0 rgba(0,0,0,.06) inset, 0 0 0 1px rgba(0,0,0,.04);
  }

  /* annotation arrow */
  .anno {
    position: absolute; font-family: 'Caveat', cursive; font-size: 19px;
    color: var(--note); pointer-events: none; line-height: 1.05;
  }
  .anno svg { overflow: visible; }

  /* keep canvas-y background */
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
